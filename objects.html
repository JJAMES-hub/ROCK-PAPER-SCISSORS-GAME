<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>

<body>

    <button onclick="
gamePlay('rock');
">ROCK</button>

    <button onclick="
gamePlay('paper');
">PAPER</button>

    <button onclick="
gamePlay('scissors');
">SCISSORS</button>

<button onclick="
    score.win = 0;
    score.lose = 0;
    score.tie = 0;
    // localStorage.removeItem('score');
       alert(`you reset the values
     wins:0 lose:0 Tie:0`);
    ">RESET SCORE</button>
   
   <script>
 const score = JSON.parse(localStorage.getItem('score'))
||{
    win:0,
    lose:0,
    tie:0
};

function gamePlay(playerMove) {
    const computerPicked = computerMove();
    let results = '';
    if (playerMove === 'scissors') {
        if (computerPicked === 'rock') {
            results = 'You lose';
        } else if (computerPicked === 'paper') {
            results = 'You win';
        } else if (computerPicked === 'scissors') {
            results = 'A tie';
        }

    } else if (playerMove === 'paper') {
        if (computerPicked === 'rock') {
            results = 'You win';
        } else if (computerPicked === 'paper') {
            results = 'A tie';
        } else if (computerPicked === 'scissors') {
            results = 'You lose';
        }

    } else if (playerMove === 'rock') {
        if (computerPicked === 'rock') {
            results = 'A tie';
        } else if (computerPicked === 'paper') {
            results = 'You lose';
        } else if (computerPicked === 'scissors') {
            results = 'You win';
        }
    }

    if (results === 'You win') {
        score.win += 1;
    } else if (results === 'A tie') {
        score.tie += 1;
    } else if (results === 'You lose') {
        score.lose += 1;
    }
//console.log(JSON.stringify(score));
localStorage.setItem('score', JSON.stringify(score));
   
alert(`You picked ${playerMove}. computer picked ${computerPicked}. results ${results}
wins:${score.win} lose:${score.lose} Tie:${score.tie}`);
}

function computerMove() {
    let randomNumber = Math.random();
    let computerPicked = '';

    if (randomNumber < 1 / 3) {
        computerPicked = 'rock';
    } else if (randomNumber < 2 / 3) {
        computerPicked = 'paper';
    } else {
        computerPicked = 'scissors';
    }

    return computerPicked;
}
</script>

</body>

</html>
